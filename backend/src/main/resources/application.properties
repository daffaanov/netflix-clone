spring.application.name=streamflix-backend
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/streamflix_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

app.jwt.secret=${JWT_SECRET:change-this-development-secret-change-this-development-secret}
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
tmdb.api.key=${TMDB_API_KEY:}
tmdb.base-url=https://api.themoviedb.org/3
